{% load static %}
<nav class="sticky top-0 z-30 w-full bg-base-100 border-b border-base-300">
    <div class="flex items-center justify-end px-4 py-2">

        <!-- Right: Actions -->
        <div class="flex items-center gap-4">

            <!-- Notifications -->
            <button 
                    id="notifDropdownBtn"
                    class="flex flex-col items-center text-green-600 hover:text-orange-500 cursor-pointer"
                    hx-get="{% url 'notifications:dropdown' %}"
                    hx-trigger="click"
                    hx-target="#notifDropdown"
                    hx-swap="innerHTML">
                    
                    <span class="relative text-2xl indicator">
                        <i class="fa-solid fa-bell"></i>
                        {% if unread_notif_count > 0 %}
                        <span class="badge badge-sm indicator-item bg-orange-500 text-white text-sm rounded-full py-2">
                            {{ unread_notif_count }}
                        </span>
                        {% endif %}
                    </span>
                    
            </button>

            <!-- Notification dropdown target -->
            <div id="notifDropdown" class="absolute border-0 right-4 top-16 w-80 bg-white rounded-lg shadow-lg z-50 hidden"></div>

            <div class="dropdown dropdown-end">
                <label tabindex="0"
                    class="btn btn-ghost flex items-center gap-2 px-2">

                    <!-- Avatar -->
                    <div class="w-9 h-9 rounded-full bg-green-600 
                                flex items-center justify-center">
                        <span class="text-white font-bold text-xl">
                            {% if request.user.first_name %}
                                {{ request.user.first_name|first|upper }}
                            {% else %}
                                {{ request.user.email|first|upper }}
                            {% endif %}
                        </span>
                    </div>
                </label>

                <!-- Dropdown menu -->
                <ul tabindex="0"
                    class="mt-3 p-2 shadow menu menu-sm dropdown-content bg-base-100
                        rounded-box w-52 border border-base-300">

                    <li>
                        <a class="flex items-center gap-2">
                            <i class="fa-solid fa-user"></i>
                            Profile
                        </a>
                    </li>

                    <li>
                        <a class="flex items-center gap-2">
                            <i class="fa-solid fa-gear"></i>
                            Settings
                        </a>
                    </li>

                    <li class="border-t border-base-200 mt-1">
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit"
                                    class="flex items-center gap-2 text-error w-full text-left px-2 py-1.5 hover:bg-base-200 rounded">
                                <i class="fa-solid fa-right-from-bracket"></i>
                                Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>


        </div>
    </div>
</nav>
