{% load static %}
<nav class="sticky top-0 z-30 w-full bg-base-100 border-b border-base-300">
    <div class="flex items-center justify-end px-4 py-2 gap-16">

        <!-- Right: Actions -->
        <div class="flex items-center gap-4">

            <!-- Notifications -->
            <button 
                    id="notifDropdownBtn"
                    class="flex flex-col items-center text-green-600 hover:text-orange-500 cursor-pointer"
                    hx-get="{% url 'notifications:dropdown' %}"
                    hx-trigger="click"
                    hx-target="#notifDropdown"
                    hx-swap="innerHTML">
                    
                    <span class="relative text-2xl indicator">
                        <i class="fa-solid fa-bell"></i>
                        {% if unread_notif_count > 0 %}
                        <span class="badge badge-sm indicator-item bg-orange-500 text-white text-sm rounded-full py-2">
                            {{ unread_notif_count }}
                        </span>
                        {% endif %}
                    </span>
                    
            </button>

            <!-- Notification dropdown target -->
            <div id="notifDropdown" class="absolute border-0 right-4 top-16 w-80 bg-white rounded-lg shadow-lg z-50 hidden"></div>

            <div class="dropdown dropdown-end">
                <label tabindex="0"
                    class="btn btn-ghost flex items-center gap-2 px-2">

                    <!-- Avatar -->
                    <div class="w-9 h-9 rounded-full bg-green-600 
                                flex items-center justify-center">
                        <span class="text-white font-bold text-xl">
                            {% if request.user.first_name and request.user.last_name %}
                                {{ request.user.first_name|first|upper }}{{ request.user.last_name|first|upper }}
                            {% elif request.user.first_name %}
                                {{ request.user.first_name|slice:":2"|upper }}
                            {% else %}
                                {{ request.user.email|slice:":2"|upper }}
                            {% endif %}
                        </span>
                    </div>
                </label>

                <!-- Dropdown menu -->
                <ul tabindex="0"
                    class="mt-3 p-4 shadow menu menu-sm dropdown-content bg-base-100
                        rounded-box w-52 border border-base-300">

                    <li class="mt-4">
                        <a href="{% url 'profile' %}" class="flex items-center gap-2">
                            <i class="fa-solid fa-user"></i>
                            Profile
                        </a>
                    </li>

                    <li class="mt-4">
                        {% if is_superuser %}
                            <a href="{% url 'admin_ticket_list' %}" class="flex items-center gap-2">
                                <i class="fa-solid fa-headset"></i>
                                Support
                            </a>
                        {% else %}
                            <a href="{% url 'support_ticket_list' %}" class="flex items-center gap-2">
                                <i class="fa-solid fa-headset"></i>
                                Support
                            </a>
                        {% endif %}
                    </li>

                    <li class="mt-4">
                        <a href="{% url 'swagger-ui' %}" class="flex items-center gap-2" target="_blank" rel="noopener noreferrer">
                            <i class="fa-solid fa-code"></i>
                            APIs
                        </a>
                    </li>

                    {% if request.user.role == 'superadmin' or request.user.role == 'admin' %}
                    <li class="mt-4">
                        <a href="{% url 'invite_user' %}" class="flex items-center gap-2">
                            <i class="fa-solid fa-person-circle-plus"></i>
                            Add User
                        </a>
                    </li>
                    {% endif %}

                    <li class="mt-4">
                        <a href="{% url 'terms' %}" class="flex items-center gap-2">
                            <i class="fa-solid fa-file-contract"></i>
                            Terms Of Service
                        </a>

                    </li>

                    <li class="mt-4">
                        <a href="https://powerpayafrica.com/" class="flex items-center gap-2" target="_blank" rel="noopener noreferrer">
                            <i class="fa-solid fa-globe"></i>
                            Website
                        </a>
                    </li>

                    <li class="border-t-2 border-base-200 mt-4">
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit"
                                    class="flex items-center gap-2 text-error cursor-pointer mt-1">
                                <i class="fa-solid fa-right-from-bracket"></i>
                                Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>


        </div>
    </div>
</nav>
