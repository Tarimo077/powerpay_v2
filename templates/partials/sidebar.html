{% load static %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<!-- Mobile Hamburger -->
<button id="mobile-menu-btn"
        class="lg:hidden fixed top-1 left-2 z-50 bg-base-100 p-2 rounded-md shadow">
    <i class="fas fa-bars text-xl text-green-600"></i>
</button>

<!-- Mobile Overlay -->
<div id="mobile-overlay"
     class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden"></div>

<!-- Sidebar -->
<nav id="sidebar"
     class="
        fixed top-0 left-0 h-full bg-base-100 shadow-sm flex flex-col
        transition-all duration-300 z-50
        w-64
        -translate-x-full lg:translate-x-0
     ">

    <div class="flex justify-end p-2 lg:hidden">
        <button id="mobile-close-btn" class="btn btn-ghost btn-sm text-gray-500">
            <i class="fas fa-xmark text-xl"></i>
        </button>
    </div>

    <!-- Logo -->
    <div class="flex items-center justify-center p-4 space-x-2 mt-2">
        <img src="{% static 'images/pp_no_bgcropped.png' %}" class="h-8 w-8">
        <span id="sidebar-text" class="font-bold text-green-800 text-xl">
            PowerPay Africa
        </span>
    </div>

    <!-- Navigation Links -->
    <div class="flex flex-col mt-4 space-y-2 flex-1 overflow-y-auto text-sm">

        <a href="{% url 'index' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if request.path == '/' %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fas fa-chart-line w-5"></i>
            <span class="link-text">Overview</span>
        </a>

        {% if is_superuser %}
        <a href="{% url 'organizations_page' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if 'organizations' in request.path %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fas fa-industry w-5"></i>
            <span class="link-text">Organizations</span>
        </a>
        {% endif %}

        <a href="{% url 'device_list' %}"
            class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
            {% if 'devices' in request.path and 'schedules' not in request.path %} 
                bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 
            {% else %} 
                text-gray-600 hover:text-green-400 
            {% endif %}">
            <i class="fas fa-plug w-5"></i>
            <span class="link-text">Devices</span>
        </a>

        <a href="{% url 'device_schedule_list' %}"
            class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
            {% if 'schedules' in request.path %} 
                bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 
            {% else %} 
                text-gray-600 hover:text-green-400 
            {% endif %}">
            <i class="fa-solid fa-calendar-day w-5"></i>
            <span class="link-text">Device Schedules</span>
        </a>

        <a href="{% url 'customers_page' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if 'customers' in request.path %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fas fa-users w-5"></i>
            <span class="link-text">Customers</span>
        </a>

        <a href="{% url 'sales_page' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if 'sales' in request.path %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fa-solid fa-cash-register w-5"></i>
            <span class="link-text">Sales</span>
        </a>

        <!-- Inventory -->
        {% if request.user.is_superuser %}
        <a href="{% url 'inventory_page' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if request.path == '/inventory/' %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fa-solid fa-boxes-stacked w-5"></i>
            <span class="link-text">Inventory</span>
        </a>

        <!-- Warehouses (SUPERUSERS ONLY) -->
        <a href="{% url 'warehouses_page' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if 'warehouses' in request.path %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fa-solid fa-warehouse w-5"></i>
            <span class="link-text">Warehouses</span>
        </a>
        {% endif %}

        <a href="{% url 'transactions_page' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if 'transactions' in request.path %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fas fa-credit-card w-5"></i>
            <span class="link-text">Transactions</span>
        </a>

        <a href="{% url 'export_data' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if 'export' in request.path %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fas fa-file-export w-5"></i>
            <span class="link-text">Export Center</span>
        </a>
        
        <a href="{% url 'import_center' %}"
           class="flex items-center gap-4 p-4 mx-3 rounded-sm transition 
           {% if 'import' in request.path %} bg-green-100 border-l-4 text-green-700 border-r-4 border-green-600 {% else %} text-gray-600 hover:text-green-400 {% endif %}">
            <i class="fas fa-file-import w-5"></i>
            <span class="link-text">Import Center</span>
        </a>


        <form method="post" action="{% url 'logout' %}" class="mt-auto">
            {% csrf_token %}
            <button type="submit"
                    class="flex items-center gap-4 p-4 mx-3 text-error hover:text-red-800 hover:bg-base-200 rounded-lg transition cursor-pointer">
                <i class="fas fa-right-from-bracket w-5"></i>
                <span class="link-text">Logout</span>
            </button>
        </form>

    </div>

    <!-- Desktop Collapse Button -->
    <button id="sidebar-toggle"
            class="hidden lg:block absolute top-1/16 -right-4 -translate-y-1/2
                   bg-base-100 border-none rounded-full p-2 shadow">
        <i class="fas fa-chevron-left"></i>
    </button>
</nav>

<script>
const SIDEBAR_KEY = 'sidebar_state';

document.addEventListener('DOMContentLoaded', () => {
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebar-toggle');
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const overlay = document.getElementById('mobile-overlay');
    const sidebarText = document.getElementById('sidebar-text');
    const pageContent = document.getElementById('page-content');
    const chevron = toggleBtn?.querySelector('i');
    const mobileCloseBtn = document.getElementById('mobile-close-btn');

    const isDesktop = () => window.innerWidth >= 1024;

    /* ---------------- INITIAL STATE ---------------- */
    if (isDesktop()) {
        const state = localStorage.getItem(SIDEBAR_KEY) || 'expanded';
        state === 'collapsed' ? collapse(false) : expand(false);
    } else {
        // Force full view on mobile/tablet regardless of desktop's saved state
        expand(false); 
    }

    toggleBtn?.addEventListener('click', () => {
        if (!isDesktop()) return;
        sidebar.classList.contains('w-20') ? expand(true) : collapse(true);
    });

    /* ---------------- MOBILE MENU ---------------- */
    mobileBtn?.addEventListener('click', () => {
        // Ensure it is expanded before showing
        expand(false); 
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    });

    // NEW: Close button listener
    mobileCloseBtn?.addEventListener('click', closeMobile);
    overlay?.addEventListener('click', closeMobile);

    function closeMobile() {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }

    /* ---------------- HELPERS ---------------- */
    function collapse(save) {
        // ONLY collapse width if on desktop
        if (isDesktop()) {
            sidebar.classList.replace('w-64', 'w-20');
            pageContent?.classList.replace('lg:ml-64', 'lg:ml-20');
            
            document.querySelectorAll('.link-text').forEach(e => e.classList.add('hidden'));
            sidebarText.classList.add('hidden');
            chevron?.classList.replace('fa-chevron-left','fa-chevron-right');
            
            if (save) localStorage.setItem(SIDEBAR_KEY, 'collapsed');
        }
    }

    function expand(save) {
        // Always w-64 on mobile, or expanding on desktop
        sidebar.classList.remove('w-20');
        sidebar.classList.add('w-64');

        if (isDesktop()) {
            pageContent?.classList.remove('lg:ml-20');
            pageContent?.classList.add('lg:ml-64');
            if (save) localStorage.setItem(SIDEBAR_KEY, 'expanded');
        }

        document.querySelectorAll('.link-text').forEach(e => e.classList.remove('hidden'));
        sidebarText.classList.remove('hidden');
        chevron?.classList.replace('fa-chevron-right','fa-chevron-left');
    }

    /* Close mobile menu on resize and reset state */
    window.addEventListener('resize', () => {
        if (!isDesktop()) {
            closeMobile();
            expand(false); // Reset to full width for mobile view
        } else {
            // Re-apply the user's desktop preference
            const state = localStorage.getItem(SIDEBAR_KEY) || 'expanded';
            state === 'collapsed' ? collapse(false) : expand(false);
        }
    });
});
</script>
