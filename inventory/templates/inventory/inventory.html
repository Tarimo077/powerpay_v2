{% extends "base.html" %}
{% block content %}
{% include "partials/navbar.html" %}

<div class="flex min-h-screen bg-base-200">
    {% include "partials/sidebar.html" %}

    <div class="px-4 py-2 w-full overflow-x-auto transition-all duration-300
            lg:ml-64 ml-0 space-y-6" id="page-content">

        <h2 class="text-2xl font-bold">Inventory</h2>

        <!-- STATS -->
        <div class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4">
            <div class="card bg-base-100 shadow p-4 border-l-4 border-success">
                <p class="text-sm">Total Items</p>
                <p class="text-2xl font-bold text-success">{{ total_items }}</p>
            </div>

            <div class="card bg-base-100 shadow p-4 border-l-4 border-info">
                <p class="text-sm">New (30 days)</p>
                <p class="text-2xl font-bold text-info">{{ new_items_30 }}</p>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card bg-base-100 shadow p-4">
                <h3 class="font-semibold mb-2">Inventory Growth</h3>
                <div class="flex-1">
                    <canvas id="inventoryGrowthChart"></canvas>
                </div>
            </div>

            <div class="card bg-base-100 shadow p-4">
                <h3 class="font-semibold mb-2">Items per Warehouse</h3>
                <div class="flex-1">
                    <canvas id="warehouseChart"></canvas>
                </div>
            </div>
        </div>


        <!-- TABLE -->
        
        {% include "partials/inventory_table.html" %}
        

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script>
Chart.defaults.font.family = "'Saira', sans-serif";
Chart.defaults.font.size = 12;

// 1. Define the Plugin
const centerTotalPlugin = {
    id: 'centerTotal',
    afterDatasetsDraw(chart) {
        const { ctx, data, chartArea: { top, bottom, left, right, width, height } } = chart;
        
        ctx.save();
        
        // Calculate the total sum of the data
        const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
        
        // Set Font Styles
        const fontSize = 10;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const centerX = left + width / 2;
        const centerY = top + height / 2;

        // Draw "Total" Label
        ctx.font = `${fontSize * 0.1}em 'Saira'`;
        ctx.fillStyle = '#07783c';
        ctx.fillText('TOTAL: ', centerX, centerY - 15);

        // Draw the Sum Value
        ctx.font = `bold ${fontSize * 0.2}em 'Saira'`;
        ctx.fillStyle = '#07783c';
        ctx.fillText(total.toLocaleString(), centerX, centerY + 15);
        
        ctx.restore();
    }
};
new Chart(document.getElementById("inventoryGrowthChart"), {
    type: "line",
    data: {
        labels: {{ growth_labels|safe }},
        datasets: [{
            label: "Total Items",
            data: {{ growth_data|safe }},
            fill: true,
            tension: 0.3,
            pointRadius: 4,
            pointHoverRadius: 6,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { 
                position: 'bottom',
                labels: {
                    usePointStyle: true,
                    pointStyle: 'rectRounded',
                    padding: 20
                }
            },
            tooltip: { mode: 'index', intersect: false, usePointStyle: true }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: { precision: 0 }
            }
        }
    }

});

new Chart(document.getElementById("warehouseChart"), {
    type: "doughnut",
    data: {
        labels: {{ warehouse_labels|safe }},
        datasets: [{
            data: {{ warehouse_data|safe }}
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { position: 'bottom' },
            datalabels: {
                color: '#fff',
                formatter: (value, ctx) => {
                    const sum = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
                    const percent = ((value/sum)*100).toFixed(1);
                    return value.toLocaleString() + ` (${percent}%)`;
                },
            }
        }
    },
    plugins: [ChartDataLabels, centerTotalPlugin]
});
</script>

{% endblock %}
