{% extends "base.html" %}
{% block content %}
<div class="container mx-auto mt-4">
    <h2 class="text-2xl font-bold mb-4">{{ device.deviceid }} Details</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="card p-4 bg-base-200 shadow">
            <h3 class="font-semibold mb-2">Device Info</h3>
            <p>Status: {{ device.active|yesno:"On,Off" }}</p>
            <p>Active: {{ device.is_active|yesno:"Yes,No" }}</p>
            <p>Last Seen: {{ last_seen|default:"-" }}</p>
            <p>kWh Today: {{ kwh_today }}</p>
        </div>

        <div class="card p-4 bg-base-200 shadow">
            <h3 class="font-semibold mb-2">Energy Chart (Today)</h3>
            <canvas id="energyChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('energyChart').getContext('2d');
const energyChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [], // you can populate with times
        datasets: [{
            label: 'kWh',
            data: [], // populate with kWh readings
            borderColor: 'rgb(34,197,94)',
            backgroundColor: 'rgba(34,197,94,0.3)',
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>
{% endblock %}
