{% load humanize %}
<tr id="device-{{ deviceid }}">
    <td class="text-left">{{ deviceid }}</td>

    <td class="text-center flex items-center gap-4 justify-center">
        <!-- Status badge -->
        <span class="badge text-white {% if active %}badge-success{% else %}badge-error{% endif %}">
            {{ active|yesno:"ON,OFF" }}
        </span>

        <!-- Toggle switch -->
        <input
            type="checkbox"
            class="toggle status-switch
            {% if active %} toggle-success {% else %} toggle-error{% endif %}"
            {% if active %}checked{% endif %}

            data-deviceid="{{ deviceid }}"
            hx-post="{% url 'change_device_status' %}"
            hx-trigger="change"
            hx-target="#device-{{ deviceid }}"
            hx-swap="outerHTML transition:true"
            hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
            hx-vals='{
                "deviceid":"{{ deviceid }}",
                "active":"{{ active|yesno:"false,true" }}"
            }'
        />

    </td>

    <td class="text-center">
        {% if last_seen %}
            {{ last_seen|naturaltime }}
        {% else %}
            -
        {% endif %}
    </td>

    {% if is_superuser %}
    <td class="text-center">
        {{ organization.name }}
    </td>

    {% endif %}

    <td class="text-center flex flex-row gap-2 justify-center">
        <a href="{% url 'device_detail' deviceid %}" class="btn btn-sm btn-primary">View<i class="fa-solid fa-binoculars"></i></a>
        
        {% if is_admin %}
        <a href="{% url 'device_edit' deviceid %}"
        class="btn btn-sm btn-accent text-white">
            <i class="fa-solid fa-pen-to-square"></i> Edit
        </a>

        <button
            onclick="confirmDelete('{{ deviceid }}', '{{ deviceid }}')"
            class="btn btn-sm btn-error text-white">
            <i class="fa-solid fa-trash"></i> Delete
        </button>
        {% endif %}
    </td>
</tr>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
document.body.addEventListener('htmx:confirm', function(event) {
    const target = event.target;

    if (!target.classList.contains("status-switch")) return;

    event.preventDefault(); // Stop HTMX request until confirmation

    const deviceID = target.dataset.deviceid;
    const isChecked = target.checked;
    const action = isChecked ? "activate" : "deactivate";

    Swal.fire({
        title: `Confirm Action`,
        text: `Are you sure you want to ${action} ${deviceID}?`,
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: `Yes`,
        cancelButtonText: "Cancel",
        customClass: {
            confirmButton: "swal-confirm-btn",
            cancelButton: "swal-cancel-btn"
        }
    }).then((result) => {
        if (result.isConfirmed) {
            if (event.detail && typeof event.detail.issueRequest === "function") {
                event.detail.issueRequest(); // 🔥 Resume HTMX request
            }
        } else {
            target.checked = !isChecked; // Revert toggle if cancelled
        }
    });
});

function confirmDelete(deviceId, deviceName) {
    Swal.fire({
        title: "Delete device?",
        text: `Device ${deviceName} will be permanently deleted.`,
        icon: "warning",
        showCancelButton: true,
        customClass: {
            confirmButton: "swal-confirm-btn",
            cancelButton: "swal-cancel-btn"
        },
        confirmButtonText: "Yes, delete it",
    }).then((result) => {
        if (result.isConfirmed) {
            const form = document.createElement("form");
            form.method = "POST";
            form.action = `/devices/delete/${deviceId}/`;

            const csrfToken = "{{ csrf_token }}";
            const csrfInput = document.createElement("input");
            csrfInput.type = "hidden";
            csrfInput.name = "csrfmiddlewaretoken";
            csrfInput.value = csrfToken;

            form.appendChild(csrfInput);
            document.body.appendChild(form);
            form.submit();
        }
    });
}
</script>

<style>
/* Customizing the SweetAlert buttons */
.swal-confirm-btn {
    background-color: #28a745 !important;
    color: white !important;
    border-radius: 5px !important;
    padding: 10px 20px !important;
}

.swal-cancel-btn {
    background-color: #dc3545 !important;
    color: white !important;
    border-radius: 5px !important;
    padding: 10px 20px !important;
}

.swal-text {
    font-size: 16px !important;
    color: #333 !important;
    font-family: "Poppins", sans-serif !important;
}

.swal-title {
    font-size: 20px !important;
    font-weight: bold !important;
    color: #444 !important;
    font-family: "Poppins", sans-serif !important;
}

/* Ensure the 'off' state also has a white circle against the red */
.toggle.toggle-error:not(:checked) {
    background-color: #ef4444 !important; /* The Red BG */
    border-color: #ef4444 !important;
    color: white !important;
    --tglbg: white !important;
}
</style>
