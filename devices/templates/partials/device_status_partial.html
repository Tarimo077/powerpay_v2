<div class="card-body" id="device-{{ device.deviceid }}">
    <p class="text-sm text-gray-500 uppercase mb-2"><i class="fa-solid fa-circle-info text-success text-lg mr-2" title="This represents the state of the device. Device {{ device.deviceid }} will{% if not device.active %} not{% endif %} operate as usual. "></i>Status</p>

    <div class="grid grid-cols-2 items-center w-full">
        <!-- Status badge -->
        <span class="badge text-white justify-self-start {% if device.active %}badge-success{% else %}badge-error{% endif %}">
            {{ device.active|yesno:"ACTIVE, INACTIVE" }}
        </span>

        <div class="flex justify-self-end items-center gap-3">

            <!-- Toggle -->
            <input
                type="checkbox"
                class="toggle status-switch {% if device.active %}toggle-success{% else %}toggle-error{% endif %}"
                {% if device.active %}checked{% endif %}

                data-deviceid="{{ device.deviceid }}"

                hx-post="{% url 'change_device_status_partial' %}"
                hx-trigger="change"
                hx-disabled-elt="this"
                hx-target="#device-{{ device.deviceid }}"
                hx-swap="outerHTML transition:true"
                hx-indicator="#spinner-{{ device.deviceid }}"
                hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
                hx-vals='{
                    "deviceid": "{{ device.deviceid }}",
                    "active": "{{ device.active|yesno:"false,true" }}"
                }'
            />

             <!-- Spinner -->
            <span
                class="htmx-indicator loading loading-spinner loading-sm text-primary"
                id="spinner-{{ device.deviceid }}"
            ></span>
        </div>
    </div>

    <p class="flex justify-end italic text-gray-500 font-semibold text-xs mt-2">Last Used at {{ last_seen }}</p>
</div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
document.body.addEventListener('htmx:confirm', function(event) {
    const target = event.target;

    if (!target.classList.contains("status-switch")) return;

    event.preventDefault(); // Stop HTMX request until confirmation

    const deviceID = target.dataset.deviceid;
    const isChecked = target.checked;
    const action = isChecked ? "activate" : "deactivate";

    Swal.fire({
        title: `Confirm Action`,
        text: `Are you sure you want to ${action} ${deviceID}?`,
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: `Yes`,
        cancelButtonText: "Cancel",
        customClass: {
            confirmButton: "swal-confirm-btn",
            cancelButton: "swal-cancel-btn"
        }
    }).then((result) => {
        if (result.isConfirmed) {
            if (event.detail && typeof event.detail.issueRequest === "function") {
                event.detail.issueRequest(); // 🔥 Resume HTMX request
            }
        } else {
            target.checked = !isChecked; // Revert toggle if cancelled
        }
    });
});
</script>

<style>
/* SweetAlert buttons */
.swal-confirm-btn {
    background-color: #28a745 !important;
    color: white !important;
    border-radius: 5px !important;
    padding: 10px 20px !important;
}

.swal-cancel-btn {
    background-color: #dc3545 !important;
    color: white !important;
    border-radius: 5px !important;
    padding: 10px 20px !important;
}

.swal-text {
    font-size: 16px !important;
    color: #333 !important;
    font-family: "Poppins", sans-serif !important;
}

.swal-title {
    font-size: 20px !important;
    font-weight: bold !important;
    color: #444 !important;
    font-family: "Poppins", sans-serif !important;
}

/* Ensure the 'off' toggle looks correct */
.toggle.toggle-error:not(:checked) {
    background-color: #ef4444 !important;
    border-color: #ef4444 !important;
    color: white !important;
    --tglbg: white !important;
}

.htmx-indicator {
    display: none;
}

/* ONLY show spinner when the TOGGLE is making a request */
.status-switch.htmx-request + .htmx-indicator,
.status-switch.htmx-request ~ .htmx-indicator {
    display: inline-flex;
}

</style>
