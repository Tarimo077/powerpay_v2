<!DOCTYPE html>
<html>
<body style="background:#f3f4f6; padding:20px;">

<div style="max-width:600px;margin:40px auto;background:#fff;border-radius:20px;box-shadow:0 8px 25px rgba(0,0,0,.08);">

  <div style="text-align:center;padding:30px;">
    <img src="https://appliatrix.com/static/css/pplogo.png" width="240">
  </div>

  <div style="padding:40px;text-align:center;">
    <h2 style="color:#16a34a;">You’ve been invited</h2>

    <p style="font-size:16px;color:#374151;">
      You’ve been invited to join <strong>{{ organization }} Organization</strong>
      on PowerPay Africa SaaS Platform.
    </p>

    <a href="{{ invite_url }}"
       style="
         display:inline-block;
         margin-top:25px;
         padding:14px 28px;
         background:#16a34a;
         color:white;
         text-decoration:none;
         border-radius:10px;
         font-weight:600;
       ">
      Accept Invitation
    </a>

    <p style="margin-top:20px;font-size:14px;color:#6b7280;">
      This invitation expires in 3 days.
    </p>
  </div>

</div>

</body>
</html>
