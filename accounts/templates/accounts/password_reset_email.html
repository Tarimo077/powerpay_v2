{% load static %}
<!DOCTYPE html>
<html lang="en">

<body style="background:#f9fafb; margin:0; padding:10px;">

  <div style="max-width:600px; margin:40px auto; background:white; border-radius:20px;
              box-shadow:0 10px 25px rgba(0,0,0,0.1); overflow:hidden;">

    <!-- Header with Logo -->
    <div style="background:white; padding:30px 20px; text-align:center;">
      <img src="https://appliatrix.com/static/css/pplogo.png"
           alt="PowerPayAfrica Logo"
           style="
             width:260px;
             height:auto;
             border-radius:14px;
             padding:10px;
             background:white;
             box-shadow:0 4px 10px rgba(0,0,0,0.05);
           ">
    </div>

    <!-- Content Box -->
    <div style="padding:40px;">

      <h2 style="color:#16a34a; font-size:22px; text-align:center; margin-bottom:15px;">
        Password Reset Request
      </h2>

      <p style="font-size:16px; color:#374151; text-align:center; margin-bottom:25px;">
        Hi {{ user.get_username }},<br>
        You requested to reset your password.
      </p>

      <!-- Reset Button -->
      <div style="text-align:center; margin:30px 0;">
        <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}"
           style="background:#f97316; color:white; padding:14px 28px; text-decoration:none;
                  border-radius:10px; font-size:16px; font-weight:bold; display:inline-block;">
          Reset Your Password
        </a>
      </div>

      <p style="font-size:14px; color:#6b7280; text-align:center;">
        If you did not request this, please ignore this email.
      </p>
    </div>

    <!-- Footer -->
    <div style="background:#f3f4f6; padding:18px; text-align:center;
                font-size:12px; color:#9ca3af;">
      &copy; 2025 Powerpay Africa. All rights reserved.
    </div>

  </div>

</body>
</html>
