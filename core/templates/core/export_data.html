{% extends "base.html" %}
{% block content %}

{% include "partials/navbar.html" %}

<div class="flex min-h-screen overflow-hidden bg-base-200">
    {% include "partials/sidebar.html" %}

    <div id="page-content"
         class="px-6 py-6 w-full overflow-x-auto transition-all duration-300 lg:ml-64 ml-0">

        <h2 class="text-2xl font-bold mb-6">Data Export Center</h2>

        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">

                <form method="get"
                    id="export-form"
                    target="download-frame"
                    class="space-y-6">

                    <!-- Model Selection -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-semibold">
                                {{ form.model.label }}
                            </span>
                        </label>
                        {{ form.model }}
                    </div>

                    <!-- Date Filters -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-semibold">
                                    {{ form.start_date.label }}
                                </span>
                            </label>
                            {{ form.start_date }}
                        </div>

                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-semibold">
                                    {{ form.end_date.label }}
                                </span>
                            </label>
                            {{ form.end_date }}
                        </div>
                    </div>

                    <!-- DEVICE SECTION -->
                    <div id="device-selection" class="hidden">

                        <label class="font-bold block mb-3">
                            Select Device(s)
                        </label>

                        <!-- Select All -->
                        <div class="mb-4">
                            <label class="flex items-center gap-3 
                                        bg-success/10 p-3 rounded-lg 
                                        border border-success/30 
                                        cursor-pointer hover:bg-success/20">

                                <input type="checkbox" 
                                    id="select-all-devices"
                                    class="checkbox checkbox-success">

                                <span class="font-semibold">
                                    Select All Devices
                                </span>
                            </label>
                        </div>

                        <!-- Device Grid -->
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">

                            {% for checkbox in form.devices %}
                                <label class="flex items-center gap-3 
                                            bg-white p-3 rounded-lg 
                                            border border-gray-200 
                                            cursor-pointer hover:bg-gray-50">

                                    {{ checkbox.tag }}

                                    <span class="text-sm">
                                        {{ checkbox.choice_label }}
                                    </span>

                                </label>
                            {% endfor %}

                        </div>

                    </div>

                    <!-- Format -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-semibold">
                                {{ form.format.label }}
                            </span>
                        </label>
                        {{ form.format }}
                    </div>

                    <!-- Submit -->
                    <div>
                        <button type="submit"
                                class="btn btn-success text-white">
                            <i class="fa-solid fa-file-export"></i>Export Data
                        </button>
                    </div>

                </form>

                <iframe id="download-frame" name="download-frame" class="hidden"></iframe>

            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const modelSelect = document.querySelector("select[name='model']");
    const deviceSection = document.getElementById("device-selection");
    const selectAll = document.getElementById("select-all-devices");

    const startDateField = document.querySelector("input[name='start_date']").closest(".form-control");
    const endDateField = document.querySelector("input[name='end_date']").closest(".form-control");

    function toggleSections() {
        const value = modelSelect.value;

        // -------------------
        // DEVICE CHECKBOXES
        // -------------------
        if (value === "deviceinfo" || value === "devicedata") {
            deviceSection.classList.remove("hidden");
        } else {
            deviceSection.classList.add("hidden");

            document.querySelectorAll("#device-selection input[type='checkbox']")
                .forEach(cb => cb.checked = false);

            selectAll.checked = false;
        }

        // -------------------
        // DATE FILTERS
        // -------------------
        if (value === "transactions" || value === "devicedata" || value === "sales" || value=== "customers" || value === "inventory") {
            startDateField.classList.remove("hidden");
            endDateField.classList.remove("hidden");
        } else {
            startDateField.classList.add("hidden");
            endDateField.classList.add("hidden");

            document.querySelector("input[name='start_date']").value = "";
            document.querySelector("input[name='end_date']").value = "";
        }
    }

    selectAll.addEventListener("change", function () {
        const checked = this.checked;

        document.querySelectorAll("#device-selection input[type='checkbox']:not(#select-all-devices)")
            .forEach(cb => cb.checked = checked);
    });

    toggleSections();
    modelSelect.addEventListener("change", toggleSections);

});
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("export-form");

    // Helper to get cookie value
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        const formData = new FormData(form);
        const params = new URLSearchParams(formData).toString();

        fetch(`/export/count/?${params}`)
            .then(response => response.json())
            .then(data => {
                Swal.fire({
                    title: 'Confirm Export',
                    html: `
                        <p><strong>${data.count}</strong> records will be aggregated and exported.</p>
                        <br>
                        <div class="w-full bg-gray-200 rounded-full h-4">
                            <div id="progress-bar" class="bg-green-600 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    `,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'Start Export',
                }).then((result) => {
                    if (result.isConfirmed) {

                        // Clear old cookie
                        document.cookie = "download_started=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

                        // Close confirm modal
                        Swal.close();

                        // Show LOADING modal
                        Swal.fire({
                            title: 'Preparing Export...',
                            html: `
                                <p>Please wait while we generate your file.</p>
                                <br>
                                <div class="w-full bg-gray-200 rounded-full h-4">
                                    <div id="progress-bar" class="bg-green-600 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
                                </div>
                            `,
                            allowOutsideClick: false,
                            showConfirmButton: false,
                            didOpen: () => {

                                let progress = 0;
                                const progressBar = document.getElementById("progress-bar");

                                const interval = setInterval(() => {
                                    progress += Math.random() * 7;
                                    if (progress >= 95) progress = 95;
                                    if (progressBar) progressBar.style.width = progress + "%";
                                }, 300);

                                // Submit form AFTER modal opens
                                form.submit();

                                // Monitor cookie
                                const checkCookie = setInterval(() => {
                                    if (getCookie("download_started") === "true") {

                                        clearInterval(interval);
                                        clearInterval(checkCookie);

                                        if (progressBar) progressBar.style.width = "100%";

                                        setTimeout(() => {
                                            Swal.fire({
                                                icon: 'success',
                                                title: 'Download Started!',
                                                text: 'Your file is being downloaded.',
                                                timer: 2500,
                                                showConfirmButton: false
                                            });

                                            document.cookie = "download_started=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                                        }, 600);
                                    }
                                }, 500);
                            }
                        });
                    }
                });
            });
    });
});
</script>

{% endblock %}
