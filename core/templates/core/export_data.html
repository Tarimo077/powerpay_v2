{% extends "base.html" %}
{% block content %}

{% include "partials/navbar.html" %}

<div class="flex min-h-screen overflow-hidden bg-base-200">
    {% include "partials/sidebar.html" %}

    <div id="page-content"
         class="px-6 py-6 w-full overflow-x-auto transition-all duration-300 lg:ml-64 ml-0">

        <h2 class="text-2xl font-bold mb-6">Data Export Center</h2>

        <div class="card bg-base-100 shadow-xl">
            <div class="card-body">

                <form method="get" class="space-y-6">

                    <!-- Model Selection -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-semibold">
                                {{ form.model.label }}
                            </span>
                        </label>
                        {{ form.model }}
                    </div>

                    <!-- Date Filters -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-semibold">
                                    {{ form.start_date.label }}
                                </span>
                            </label>
                            {{ form.start_date }}
                        </div>

                        <div class="form-control">
                            <label class="label">
                                <span class="label-text font-semibold">
                                    {{ form.end_date.label }}
                                </span>
                            </label>
                            {{ form.end_date }}
                        </div>
                    </div>

                    <!-- DEVICE SECTION -->
                    <div id="device-selection" class="hidden">

                        <label class="font-bold block mb-3">
                            Select Device(s)
                        </label>

                        <!-- Select All -->
                        <div class="mb-4">
                            <label class="flex items-center gap-3 
                                        bg-primary/10 p-3 rounded-lg 
                                        border border-primary/30 
                                        cursor-pointer hover:bg-primary/20">

                                <input type="checkbox" 
                                    id="select-all-devices"
                                    class="checkbox checkbox-primary">

                                <span class="font-semibold">
                                    Select All Devices
                                </span>
                            </label>
                        </div>

                        <!-- Device Grid -->
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">

                            {% for checkbox in form.devices %}
                                <label class="flex items-center gap-3 
                                            bg-white p-3 rounded-lg 
                                            border border-gray-200 
                                            cursor-pointer hover:bg-gray-50">

                                    {{ checkbox.tag }}

                                    <span class="text-sm">
                                        {{ checkbox.choice_label }}
                                    </span>

                                </label>
                            {% endfor %}

                        </div>

                    </div>

                    <!-- Format -->
                    <div class="form-control">
                        <label class="label">
                            <span class="label-text font-semibold">
                                {{ form.format.label }}
                            </span>
                        </label>
                        {{ form.format }}
                    </div>

                    <!-- Submit -->
                    <div>
                        <button type="submit"
                                class="btn btn-primary w-full md:w-auto">
                            Export Data
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const modelSelect = document.querySelector("select[name='model']");
    const deviceSection = document.getElementById("device-selection");
    const selectAll = document.getElementById("select-all-devices");

    function toggleDeviceSection() {
        const value = modelSelect.value;

        if (value === "deviceinfo" || value === "devicedata") {
            deviceSection.classList.remove("hidden");
        } else {
            deviceSection.classList.add("hidden");

            document.querySelectorAll("#device-selection input[type='checkbox']").forEach(cb => {
                cb.checked = false;
            });

            selectAll.checked = false;
        }
    }

    selectAll.addEventListener("change", function () {
        const checked = this.checked;

        document.querySelectorAll("#device-selection input[type='checkbox']:not(#select-all-devices)")
            .forEach(cb => cb.checked = checked);
    });

    toggleDeviceSection();
    modelSelect.addEventListener("change", toggleDeviceSection);

});
</script>

{% endblock %}
