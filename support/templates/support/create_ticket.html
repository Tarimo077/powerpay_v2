{% extends "base.html" %}
{% block content %}

{% include "partials/navbar.html" %}

<div class="flex min-h-screen bg-base-200">
    {% include "partials/sidebar.html" %}

    <div class="px-4 py-2 w-full overflow-x-auto transition-all duration-300
            lg:ml-64 ml-0 space-y-6" id="page-content">
    <h2 class="text-2xl font-bold mb-6">Create Support Ticket</h2>
    <form method="POST" class="flex flex-col gap-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="bg-success text-white px-4 py-2 rounded mt-4"><i class="fa-solid fa-ticket mr-2"></i>Submit Ticket</button>
    </form>
</div>

{% endblock %}
